name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-native:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            suffix: .exe
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            suffix: ""
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            suffix: ""

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install musl-tools
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install ARM64 cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools gcc-aarch64-linux-gnu

      - name: Set musl static linking
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> "$GITHUB_ENV"

      - name: Set ARM64 musl static linking
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          echo "RUSTFLAGS=-C target-feature=+crt-static" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER=aarch64-linux-gnu-gcc" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Test
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo test --target ${{ matrix.target }}

      - name: Rename binary for release
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          mv gpu-npu-util-reporter${{ matrix.suffix }} gpu-npu-util-reporter-${{ steps.version.outputs.version }}-${{ matrix.target }}${{ matrix.suffix }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: gpu-npu-util-reporter-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/gpu-npu-util-reporter-${{ steps.version.outputs.version }}-${{ matrix.target }}${{ matrix.suffix }}
          if-no-files-found: error

  # build-darwin (cross-rs/cross 方式，已替换为 zigbuild)
